<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sign In — CampusEvents</title>
  <link rel="stylesheet" href="../css/style.css">
  <script>window.API_BASE = 'http://localhost:8000';</script>
</head>
<body>
<script src="../js/api.js"></script>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div style="font-size:2rem;margin-bottom:.5rem;">🎓</div>
      <div style="font-size:1.35rem;font-weight:800;">Campus<span style="color:var(--accent)">Events</span></div>
    </div>

    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to manage your registrations</p>

    <form class="auth-form" id="login-form" style="margin-top:1.5rem;">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" id="email"
               placeholder="you@college.edu" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" id="password"
               placeholder="••••••••" autocomplete="current-password" required>
      </div>

      <div id="form-error" style="font-size:.83rem;color:var(--error);display:none;padding:.5rem .75rem;
           background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:var(--radius-sm);">
      </div>

      <button type="submit" class="btn btn-primary btn-full" id="submit-btn" style="margin-top:.25rem;">
        <span class="btn-text">Sign In →</span>
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="register.html">Sign up</a>
    </div>
  </div>
</div>

<script>
// Redirect if already logged in
if (API.isLoggedIn()) window.location.href = '../index.html';

const form = document.getElementById('login-form');
const errEl = document.getElementById('form-error');
const btn   = document.getElementById('submit-btn');

form.addEventListener('submit', async e => {
  e.preventDefault();
  errEl.style.display = 'none';
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email || !password) return;

  btn.disabled = true; btn.classList.add('btn-loading');
  btn.querySelector('.btn-text').textContent = 'Signing in…';

  try {
    await API.login(email, password);
    toast('Welcome back! 👋', 'success');
    setTimeout(() => {
      const next = new URLSearchParams(window.location.search).get('next');
      window.location.href = next || '../index.html';
    }, 600);
  } catch (err) {
    errEl.textContent    = err.message || 'Invalid email or password';
    errEl.style.display  = 'block';
    btn.disabled         = false;
    btn.classList.remove('btn-loading');
    btn.querySelector('.btn-text').textContent = 'Sign In →';
  }
});
</script>
</body>
</html>
