<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Create Account — CampusEvents</title>
  <link rel="stylesheet" href="../css/style.css">
  <script>window.API_BASE = 'https://campus-events-management-system.onrender.com';</script>
</head>

<body>
  <script src="../js/api.js"></script>

  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <div style="font-size:2rem;margin-bottom:.5rem;">🎓</div>
        <div style="font-size:1.35rem;font-weight:800;">Campus<span style="color:var(--accent)">Events</span></div>
      </div>

      <h1 class="auth-title">Create an account</h1>
      <p class="auth-sub">Register to explore and join campus events</p>

      <form class="auth-form" id="register-form" style="margin-top:1.5rem;" novalidate>
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-control" id="name" placeholder="Your full name" autocomplete="name" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" id="email" placeholder="you@college.edu" autocomplete="email"
            required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="password" placeholder="Min. 6 characters"
            autocomplete="new-password" required id="password" minlength="6">
          <span class="form-hint">At least 6 characters</span>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input type="password" class="form-control" id="password2" placeholder="Repeat password"
            autocomplete="new-password" required>
        </div>

        <div id="form-error" style="font-size:.83rem;color:var(--error);display:none;padding:.5rem .75rem;
           background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:var(--radius-sm);">
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="submit-btn" style="margin-top:.25rem;">
          <span class="btn-text">Create Account →</span>
        </button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </div>

  <script>
    if (API.isLoggedIn()) window.location.href = '../index.html';

    const form = document.getElementById('register-form');
    const errEl = document.getElementById('form-error');
    const btn = document.getElementById('submit-btn');

    function showError(msg) {
      errEl.textContent = msg;
      errEl.style.display = 'block';
    }

    form.addEventListener('submit', async e => {
      e.preventDefault();
      errEl.style.display = 'none';

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const pass = document.getElementById('password').value;
      const pass2 = document.getElementById('password2').value;

      if (!name) { showError('Full name is required.'); return; }
      if (!email) { showError('Email is required.'); return; }
      if (pass.length < 6) { showError('Password must be at least 6 characters.'); return; }
      if (pass !== pass2) { showError('Passwords do not match.'); return; }

      btn.disabled = true; btn.classList.add('btn-loading');
      btn.querySelector('.btn-text').textContent = 'Creating account…';

      try {
        await API.register(name, email, pass);
        toast('Account created! Welcome 🎉', 'success');
        setTimeout(() => window.location.href = '../index.html', 700);
      } catch (err) {
        showError(err.message || 'Registration failed. Please try again.');
        btn.disabled = false;
        btn.classList.remove('btn-loading');
        btn.querySelector('.btn-text').textContent = 'Create Account →';
      }
    });
  </script>
</body>

</html>
